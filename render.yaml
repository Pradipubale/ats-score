services:
  # Backend Web Service
  - type: web
    name: ats-score-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend Static Site
  - type: static
    name: ats-score-frontend
    runtime: static
    plan: free
    rootDir: ats-resume-optimizer
    buildCommand: npm install && npm run build
    publishDir: dist/client
    envVars:
      - key: VITE_API_URL
        value: https://ats-score-l0or.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
